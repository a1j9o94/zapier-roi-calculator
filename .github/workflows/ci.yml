name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (app)
        run: bunx tsc --noEmit

      - name: Typecheck (Convex)
        run: bunx tsc --noEmit -p convex/tsconfig.json

      - name: Unit tests
        run: bun test

      - name: Source link health (non-blocking URLs only; allowlist for bot-walls)
        run: bun run check:source-links
        timeout-minutes: 5
